<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GiftSpace — Каталог</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="catalog">
    <div class="page-transition"></div>
    <header class="site-header glass">
      <a class="brand" href="index.html">GiftSpace</a>
      <nav class="site-nav">
        <a data-link href="index.html">Главная</a>
        <a data-link href="catalog.html">Каталог</a>
        <a data-link href="about.html">О нас</a>
      </nav>
    </header>

    <main class="container">
      <section class="page-head">
        <h1>Каталог идей</h1>
        <p>Популярные категории подарков с визуальными карточками и быстрым переходом.</p>
      </section>

      <section class="product-grid">
        <article class="product-card glass">
          <img src="https://images.unsplash.com/photo-1512499617640-c74ae3a79d37?auto=format&fit=crop&w=900&q=80" alt="Подарочный набор кофе" />
          <div>
            <h3>Кофейный сет</h3>
            <p>Для тех, кто ценит ароматные утренние ритуалы.</p>
          </div>
        </article>

        <article class="product-card glass">
          <img src="https://images.unsplash.com/photo-1512909006721-3d6018887383?auto=format&fit=crop&w=900&q=80" alt="Стильные гаджеты" />
          <div>
            <h3>Smart-гаджеты</h3>
            <p>Технологичные подарки с wow-эффектом.</p>
          </div>
        </article>

        <article class="product-card glass">
          <img src="https://images.unsplash.com/photo-1511988617509-a57c8a288659?auto=format&fit=crop&w=900&q=80" alt="Уютный домашний декор" />
          <div>
            <h3>Уютный дом</h3>
            <p>Декор и аксессуары, которые дарят тепло.</p>
          </div>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
